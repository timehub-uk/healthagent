<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0e1a"/>

  <!-- Left backbone -->
  <path d="M10 3 C8 8, 12 11, 10 16 C8 21, 12 24, 10 29"
        stroke="#1a5080" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Right backbone -->
  <path d="M22 3 C24 8, 20 11, 22 16 C24 21, 20 24, 22 29"
        stroke="#1a4070" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Rungs (base pairs) A-T G-C G-C A-T -->
  <!-- Rung 1: A (green) — T (red)  y≈7 -->
  <line x1="10" y1="7"  x2="16" y2="7"  stroke="#00cc44" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="7"  x2="22" y2="7"  stroke="#ff3355" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="7"  r="2.2" fill="#00cc44"/>
  <circle cx="22" cy="7"  r="2.2" fill="#ff3355"/>

  <!-- Rung 2: G (blue) — C (amber)  y≈13 -->
  <line x1="10" y1="13" x2="16" y2="13" stroke="#3399ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="13" x2="22" y2="13" stroke="#ffaa00" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="13" r="2.2" fill="#3399ff"/>
  <circle cx="22" cy="13" r="2.2" fill="#ffaa00"/>

  <!-- Rung 3: G (blue) — C (amber)  y≈19 -->
  <line x1="10" y1="19" x2="16" y2="19" stroke="#3399ff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="22" y2="19" stroke="#ffaa00" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="19" r="2.2" fill="#3399ff"/>
  <circle cx="22" cy="19" r="2.2" fill="#ffaa00"/>

  <!-- Rung 4: A (green) — T (red)  y≈25 -->
  <line x1="10" y1="25" x2="16" y2="25" stroke="#00cc44" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="22" y2="25" stroke="#ff3355" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="25" r="2.2" fill="#00cc44"/>
  <circle cx="22" cy="25" r="2.2" fill="#ff3355"/>

  <!-- Glow dots on midpoints -->
  <circle cx="16" cy="7"  r="1.2" fill="#ffffff22"/>
  <circle cx="16" cy="13" r="1.2" fill="#ffffff22"/>
  <circle cx="16" cy="19" r="1.2" fill="#ffffff22"/>
  <circle cx="16" cy="25" r="1.2" fill="#ffffff22"/>
</svg>
